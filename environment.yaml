name: nlp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - flask=3.0.3
  - flask-sqlalchemy=3.1.1
  - flask-login=0.6.3
  - numpy=1.26.4
  - fastapi=0.111.0
  - uvicorn=0.29.0
  - requests=2.32.3
  - python-dotenv=1.0.1
  - pypdf
  - pdfplumber
  - faiss-cpu
  - pip
  - pip:
    - openai
    - langchain-community
    - langchain-huggingface
    - langchain-text-splitters
    - sentence-transformers